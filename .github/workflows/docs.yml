name: Deploy docs to GitHub Pages

# This workflow rebuilds the MkDocs site and deploys to GitHub Pages.
# The `paths:` filter keeps the build cheap by only firing on changes to
# inputs that affect the rendered output:
#   - site/**                — extra static assets copied into the build
#   - mkdocs.yml             — site config (nav, theme, plugins)
#   - docs/**                — the actual markdown sources
#   - .github/workflows/docs.yml — this workflow file itself, so changes
#                                  to the build/deploy logic still trigger
#                                  a rebuild even when no doc content moved
# A change anywhere else (e.g. Python source, Dockerfile) will not rebuild
# the docs site, which is the intended trade-off — docs are derived from
# this narrow input set, not from the full repository.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: |
          # Install top-level packages with hash verification (--no-deps
          # because transitive deps cannot all be hash-pinned portably).
          pip install --no-cache-dir --require-hashes --no-deps \
            -r agent-governance-python/requirements/ci-docs.txt
          # Install transitive dependencies normally.
          pip install --no-cache-dir mkdocs-material==9.7.6 mkdocs-minify-plugin==0.8.0  # Scorecard: version-pinned, hash-verified via ci-docs.txt

      - name: Build docs
        run: mkdocs build --config-file mkdocs.yml --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
