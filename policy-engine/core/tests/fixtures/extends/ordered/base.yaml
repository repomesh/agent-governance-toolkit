agent_control_specification_version: "0.3.1-beta"
metadata:
  name: extends-ordered
policies:
  shared_policy:
    type: test
  duplicate_policy:
    type: test
intervention_points:
  input:
    policy_target: "$snap.input"
    policy_target_kind: user_input
    annotations:
      base_classifier:
        from: "$policy_target.text"
    policy:
      id: shared_policy
annotators:
  base_classifier:
    type: classifier
tools:
  search:
    type: Tool
    id: search
    clearance: [public]
