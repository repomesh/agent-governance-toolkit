agent_control_specification_version: "0.3.1-beta"
extends:
  - base.yaml
  - nested/mid.yaml
metadata:
  name: extends-ordered
policies:
  child_policy:
    type: test
  duplicate_policy:
    type: test
intervention_points:
  input:
    policy_target: "$snap.input"
    policy_target_kind: user_input
    annotations:
      child_classifier:
        from: "$pi.snapshot.actor.id"
    policy:
      id: shared_policy
  pre_tool_call:
    policy_target: "$snap.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$snap.tool_call.name"
    policy:
      id: child_policy
annotators:
  child_classifier:
    type: endpoint
    endpoint: https://annotators.invalid/actor
tools:
  wire_transfer:
    type: Tool
    id: wire_transfer
    clearance: [banking, payments]
