apiVersion: apps/v1
kind: Deployment
metadata:
  name: acs-mediated-app
  namespace: acs-agents
  labels:
    app.kubernetes.io/name: acs-mediated-app
    app.kubernetes.io/part-of: acs-sidecar-reference
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: acs-mediated-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acs-mediated-app
        app.kubernetes.io/part-of: acs-sidecar-reference
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/acs-mediated-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ACS_MANIFEST_PATH
              value: /etc/acs/manifest.yaml
            - name: ACS_POLICY_BUNDLE_PATH
              value: /policy
            - name: ACS_POLICY_DISPATCHER
              value: opa-http
            - name: ACS_OPA_URL
              value: http://127.0.0.1:8181
            - name: ACS_MODE
              value: enforce
            - name: OTEL_SERVICE_NAME
              value: acs-mediated-app
          volumeMounts:
            - name: acs-policy
              mountPath: /etc/acs
              readOnly: true
            - name: acs-policy
              mountPath: /policy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: opa
          image: ghcr.io/open-policy-agent/opa:0.68.0-rootless
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server
            - --addr=127.0.0.1:8181
            - --log-level=info
            - /policy
          ports:
            - name: opa-http
              containerPort: 8181
          volumeMounts:
            - name: acs-policy
              mountPath: /policy
              readOnly: true
      volumes:
        - name: acs-policy
          configMap:
            name: acs-policy-bundle
            items:
              - key: manifest.yaml
                path: manifest.yaml
              - key: acs_sidecar_reference.rego
                path: acs_sidecar_reference.rego
