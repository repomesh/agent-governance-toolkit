agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "langchain-quickstart"
extends: []
policies:
  langchain_quickstart:
    type: rego
    bundle: ./policy
    query: data.agent_control_specification.langchain_quickstart.verdict
intervention_points:
  input:
    policy_target: "$.input"
    policy_target_kind: user_input
    policy:
      id: langchain_quickstart
      query: data.agent_control_specification.langchain_quickstart.input_verdict
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    policy:
      id: langchain_quickstart
      query: data.agent_control_specification.langchain_quickstart.pre_tool_call_verdict
  output:
    policy_target: "$.output"
    policy_target_kind: assistant_output
    policy:
      id: langchain_quickstart
      query: data.agent_control_specification.langchain_quickstart.output_verdict
tools:
  search_internet: {}
  send_email: {}
  read_file: {}
