agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "cg-popular-channels"
extends: []
policies:
  cg_popular_channels:
    type: rego
    bundle: ./policy
    query: data.agent_control_specification.cg_popular_channels.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    annotations:
      message_dlp:
        from: "$policy_target.message"
    policy:
      id: cg_popular_channels
      query: data.agent_control_specification.cg_popular_channels.pre_tool_call_verdict
tools:
  channel.send_message: {}
annotators:
  message_dlp:
    type: classifier
