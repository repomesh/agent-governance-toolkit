agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "cg-whatsapp"
extends: []
policies:
  cg_whatsapp:
    type: rego
    bundle: ./policy
    query: data.agent_control_specification.cg_whatsapp.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    annotations:
      message_dlp:
        from: "$policy_target.message"
    policy:
      id: cg_whatsapp
      query: data.agent_control_specification.cg_whatsapp.pre_tool_call_verdict
tools:
  whatsapp.send_message: {}
  whatsapp.credential_store: {}
annotators:
  message_dlp:
    type: classifier
