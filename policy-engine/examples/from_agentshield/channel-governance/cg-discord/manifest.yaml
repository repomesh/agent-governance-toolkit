agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "cg-discord"
extends: []
policies:
  cg_discord:
    type: rego
    bundle: ./policy
    query: data.agent_control_specification.cg_discord.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    annotations:
      message_dlp:
        from: "$policy_target.message"
    policy:
      id: cg_discord
      query: data.agent_control_specification.cg_discord.pre_tool_call_verdict
tools:
  discord.send_message: {}
annotators:
  message_dlp:
    type: classifier
