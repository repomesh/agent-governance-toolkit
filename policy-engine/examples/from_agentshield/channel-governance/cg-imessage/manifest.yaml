agent_control_specification_version: "0.3.0-alpha"
metadata:
  name: "cg-imessage"
extends: []
policies:
  cg_imessage:
    type: rego
    bundle: ./policy
    query: data.agent_control_specification.cg_imessage.verdict
intervention_points:
  pre_tool_call:
    policy_target: "$.tool_call.args"
    policy_target_kind: tool_args
    tool_name_from: "$.tool_call.name"
    annotations:
      message_dlp:
        from: "$policy_target.message"
    policy:
      id: cg_imessage
      query: data.agent_control_specification.cg_imessage.pre_tool_call_verdict
tools:
  imessage.send_message: {}
  imessage.attachment_write: {}
annotators:
  message_dlp:
    type: classifier
